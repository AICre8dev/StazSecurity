<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Starz Security provides exceptional security services with SIA trained guards who operate with the highest degree of professionalism and trust." />
    <title>Starz Security | Professional Security Services UK</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo-horizontal-black_text.png" />
    <link rel="apple-touch-icon" href="/logo-horizontal-black_text.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <script>
      // Prevent flash of wrong theme
      (function() {
        const theme = localStorage.getItem('starz-theme');
        if (theme === 'light') {
          document.documentElement.classList.remove('dark');
        } else {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
